spring.application.name=swissroute-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/swissroute_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Carga de datos de ejemplo (data.sql) despues de crear el esquema con Hibernate
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8080

swiss-transport.api.base-url=https://transport.opendata.ch/v1

# Secret para JWT

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

logging.level.org.springframework.security=DEBUG